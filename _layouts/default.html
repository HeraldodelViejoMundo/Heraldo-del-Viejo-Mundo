<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  {% seo %}
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Analytics 4 — carga directa con IP anonimizada (RGPD light) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5309GK77Y4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-5309GK77Y4', {
      anonymize_ip: true,
      allow_google_signals: false,
      allow_ad_personalization_signals: false
    });
  </script>

  <!-- Estilos del tema minima -->
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">

  <!-- Nuestro CSS personalizado -->
  <link rel="stylesheet" href="{{ "/assets/custom.css" | relative_url }}">

</head>

<body>

  {% include navbar.html %}

  <div class="page-content">
    {{ content }}
  </div>

  <!-- Aviso discreto de cookies anónimas -->
  <footer class="cookie-notice" style="background:#4a2e0e;color:#f4ecd8;text-align:center;padding:8px 12px;font-size:0.85em;font-family:Georgia,serif;border-top:2px solid #8b5a2b;">
    Este sitio usa cookies anónimas para análisis de tráfico (Google Analytics con IP anonimizada). No se realiza seguimiento publicitario.
  </footer>

</body>
</html>
